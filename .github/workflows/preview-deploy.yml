name: Preview deploy
on:
  workflow_run:
    workflows:
      - Preview build
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  success:
    name: Preview deploy
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download preview-build artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ github.event.workflow_run.id }} \
            --repo ${{ github.repository }} \
            --name preview-build \
            --dir .
      - name: Set variables
        id: vars
        run: |
          echo "pr_number=$(cat PR_NUMBER)" >> $GITHUB_OUTPUT
          echo "pr_sha=$(cat PR_SHA)" >> $GITHUB_OUTPUT
          echo "deploy_domain=$(echo ${{ github.repository }}-$(cat PR_NUMBER).surge.sh | sed 's#/#-#')" >> $GITHUB_OUTPUT
      - name: Deploy
        id: deploy
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          # mkdocs build is in public/
          npx surge --project public --domain ${{ steps.vars.outputs.deploy_domain }} --token ${{ secrets.SURGE_TOKEN }}
      - name: Update status Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.vars.outputs.pr_number }}
          DEPLOY_DOMAIN: ${{ steps.vars.outputs.deploy_domain }}
        run: |
          MARKER='<!-- Sticky Pull Request Comment -->'
          BODY="$(printf '%s\n%s' "🎊 Navigate the preview: https://${DEPLOY_DOMAIN} 🎊" "${MARKER}")"
          EXISTING=$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)
          if [ -n "${EXISTING}" ]; then
            gh api "repos/${GH_REPO}/issues/comments/${EXISTING}" \
              -X PATCH -f body="${BODY}"
          else
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
          fi
      - name: Job failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.vars.outputs.pr_number }}
        run: |
          MARKER='<!-- Sticky Pull Request Comment -->'
          BODY="$(printf '%s\n%s' 'Deploy PR Preview failed.' "${MARKER}")"
          EXISTING=$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)
          if [ -n "${EXISTING}" ]; then
            gh api "repos/${GH_REPO}/issues/comments/${EXISTING}" \
              -X PATCH -f body="${BODY}"
          else
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
          fi
