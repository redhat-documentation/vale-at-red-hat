# GitHub Actions configuration file to
# 1. Build the project with Antora
# 2. Prepare the preview publication
# 3. Validate the internal and external links

name: Preview build
on:
  - pull_request

jobs:
  preview-build:
    name: Preview build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0 # enable git diff and building many branches

      - name: Set up Ruby (for Asciidoctor CLI)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install Asciidoctor + Rouge
        run: gem install --no-document asciidoctor rouge

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          pip install mkdocs mkdocs-material mkdocs-callouts mkdocs-asciidoctor-backend

      - name: Build MkDocs site
        run: |
          python -m mkdocs build -f mkdocs.yml

      - name: Get yearweek for cache
        id: get-date # used below
        run: echo "yearweek=$(/bin/date -u "+%Y%U")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Restore cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.0.3
        env:
          cache-name: cache
        with:
          path: .cache
          key: ${{ steps.get-date.outputs.yearweek }}

      - name: Store pull request details for preview-publish
        run: |
          echo "${{ github.event.number }}" > PR_NUMBER
          echo "${{ github.event.pull_request.head.sha }}" > PR_SHA

      - name: Validate dictionary is up to date
        run: |
          python3 tools/build-dictionary.py
          if ! git diff --quiet .vale/styles/RedHat/dictionaries/en_US-RedHat.dic; then
            echo "::error::Dictionary is out of date. Run 'python3 tools/build-dictionary.py' and commit the result."
            git diff .vale/styles/RedHat/dictionaries/en_US-RedHat.dic | head -50
            exit 1
          fi
          echo "Dictionary validated successfully."

      - name: Build release zip for testing
        run: |
          cd .vale/styles
          zip -r RedHat.zip RedHat

      - name: Upload release zip artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: RedHat-style-preview
          path: .vale/styles/RedHat.zip
          retention-days: 7

      - name: Upload preview-build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: preview-build
          path: |
            public
            PR_NUMBER
            PR_SHA
          retention-days: 7
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.0.3
        with:
          path: tmp/.htmltest
          key: ${{ runner.os }}-htmltest

      - name: Validate internal and external links
        run: |
          curl https://htmltest.wjdp.uk | bash
          bin/htmltest