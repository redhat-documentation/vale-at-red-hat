---
name: Build and validate Schematron rules

on:
  pull_request:
    paths:
      - .vale/styles/RedHat/*.yml
      - tools/vale-to-schematron.py
      - tools/validate-schematron.py
      - tools/test-schematron.py
      - schematron/fixtures/**
  push:
    branches: [main]
    paths:
      - .vale/styles/RedHat/*.yml
      - tools/vale-to-schematron.py
      - tools/validate-schematron.py
      - tools/test-schematron.py

permissions:
  contents: read
  pull-requests: write

jobs:
  build-schematron:
    name: Build and validate Schematron
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install lxml pyyaml

      - name: Generate Schematron rules
        run: python tools/vale-to-schematron.py

      - name: Validate Schematron rules
        run: python tools/validate-schematron.py

      - name: Smoke-test against DITA fixtures
        run: python tools/test-schematron.py

      - name: Upload Schematron artifacts
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: schematron-rules
          path: schematron/output/
          retention-days: 90

      - name: Comment artifact link on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MARKER='<!-- Sticky Schematron Comment -->'
          BODY="### Schematron build artifacts
          Generated Schematron rules: [Download schematron-rules.zip](${RUN_URL}#artifacts)
          ${MARKER}"
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)
          if [ -n "${EXISTING}" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
              -X PATCH -f body="${BODY}"
          else
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
          fi
