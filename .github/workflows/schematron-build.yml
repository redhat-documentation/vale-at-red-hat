---
name: Build and validate Schematron rules

on:
  pull_request:
    paths:
      - .vale/styles/RedHat/*.yml
      - tools/vale-to-schematron.py
      - tools/validate-schematron.py
      - tools/test-schematron.py
      - schematron/fixtures/**
  push:
    branches: [main]
    paths:
      - .vale/styles/RedHat/*.yml
      - tools/vale-to-schematron.py
      - tools/validate-schematron.py
      - tools/test-schematron.py

permissions:
  contents: read
  pull-requests: write

jobs:
  build-schematron:
    name: Build and validate Schematron
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install lxml pyyaml

      - name: Generate Schematron rules
        run: python tools/vale-to-schematron.py

      - name: Validate Schematron rules
        run: python tools/validate-schematron.py

      - name: Smoke-test against DITA fixtures
        run: python tools/test-schematron.py

      - name: Upload Schematron artifacts
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: schematron-rules
          path: schematron/output/
          retention-days: 90

      - name: Comment artifact link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Schematron build artifacts\n\nGenerated Schematron rules are available as a build artifact:\n\n[Download schematron-rules.zip](${runUrl}#artifacts)`
            });
