name: Release
on:
  push:
    branches:
      - main
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate dictionary is up to date
        run: |
          python3 tools/build-dictionary.py
          if ! git diff --quiet .vale/styles/RedHat/dictionaries/en_US-RedHat.dic; then
            echo "::error::Dictionary is out of date. Run 'tools/build-dictionary.py' and commit the result."
            git diff .vale/styles/RedHat/dictionaries/en_US-RedHat.dic | head -50
            exit 1
          fi
          echo "Dictionary validated successfully."

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.12"

      - name: Generate Schematron rules
        run: |
          pip install lxml pyyaml
          python tools/vale-to-schematron.py

      - name: Create release
        run: |
          cd .vale/styles
          echo $GITHUB_RUN_NUMBER > version.txt
          # RedHat package: wrap in styles/ so vale sync installs config/
          mkdir -p /tmp/RedHat/styles
          cp -r config RedHat /tmp/RedHat/styles/
          cd /tmp && zip -r "$GITHUB_WORKSPACE/.vale/styles/RedHat.zip" RedHat
          cd "$GITHUB_WORKSPACE/.vale/styles"
          zip -r AsciiDoc.zip AsciiDoc
          zip -r OpenShiftAsciiDoc.zip OpenShiftAsciiDoc
          cd schematron/output
          zip -r "$GITHUB_WORKSPACE/.vale/styles/RedHatSchematronRules.zip" .
          cd "$GITHUB_WORKSPACE/.vale/styles"
          gh release create v$GITHUB_RUN_NUMBER 'RedHat.zip' 'AsciiDoc.zip' 'OpenShiftAsciiDoc.zip' 'RedHatSchematronRules.zip'
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
